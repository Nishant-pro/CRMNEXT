<h4>Data Pump Import</h4>
<form id="dp-import-form">
    <div class="mb-3"><label>Server</label><select class="form-select" name="server_id" required>
        {% for s in servers %}<option value="{{ s.id }}">{{ s.name }} ({{ s.host }})</option>{% endfor %}
    </select></div>
    <div class="mb-3"><label>Schema</label><input class="form-control" name="schema" required></div>
    <div class="mb-3"><label>Directory</label><input class="form-control" name="directory" value="DATA_PUMP_DIR"></div>
    <div class="mb-3"><label>Dumpfile</label><input class="form-control" name="dumpfile" required></div>
    <div class="mb-3"><label>Remap Schema (optional)</label><input class="form-control" name="remap_schema"></div>
    <div class="mb-3"><label>Remap Tablespace (optional)</label><input class="form-control" name="remap_tablespace"></div>
    <div class="mb-3"><label>Parallel</label><input class="form-control" name="parallel" value="1" type="number"></div>
    <button type="submit" class="btn btn-primary">Start Import</button>
</form>
<pre id="dp-import-log" class="mt-3 border p-2" style="max-height:300px;overflow:auto;"></pre>
